<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Branch Account • Jixels Technologies</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="images/jixels-icon-192.png" type="image/png" />
    <link rel="stylesheet" href="director.css" />
    <link rel="stylesheet" href="branch-register.css" />
  </head>
  <body data-page="branch-register">
    <main class="auth-shell">
      <section class="auth-card" aria-label="Branch registration">
        <header class="auth-header">
          <h1>Jixels Technologies</h1>
          <p class="muted">Branch account setup</p>
        </header>

        <form id="branch-register-form" class="auth-form" autocomplete="off">
          <label class="field">
            <span>County / City</span>
            <input
              id="county"
              name="county"
              type="text"
              placeholder="e.g. Mombasa"
              required
            />
          </label>

          <label class="field">
            <span>Area / Location</span>
            <input
              id="area"
              name="area"
              type="text"
              placeholder="e.g. Nyali / Likoni / Bamburi"
              required
            />
          </label>

          <label class="field">
            <span>Username</span>
            <input
              id="username"
              name="username"
              type="text"
              placeholder="e.g. mombasa-nyali"
              required
            />
          </label>

          <label class="field">
            <span>Email</span>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="e.g. branch@gmail.com"
              required
            />
          </label>

          <label class="field">
            <span>Password</span>
            <input
              id="password"
              name="password"
              type="password"
              placeholder="Create a strong password"
              minlength="8"
              required
            />
          </label>

          <label class="field">
            <span>Confirm password</span>
            <input
              id="confirmPassword"
              name="confirmPassword"
              type="password"
              placeholder="Re-enter password"
              minlength="8"
              required
            />
          </label>

          <button class="btn primary" type="submit">Create account</button>

          <p
            id="branch-register-error"
            class="form-error"
            role="alert"
            aria-live="polite"
          ></p>

          <p class="muted" style="margin: 0; font-size: 13px;">
            Already have an account?
            <a href="branch-login.html" style="text-decoration: underline;"
              >Login</a
            >
          </p>
        </form>

        <footer class="auth-footer muted">
          This setup is stored on this browser only. Connect to a real backend for
          production use.
        </footer>
      </section>
    </main>

    <script src="kv-client.js"></script>
    <script src="jixels-store.js"></script>
    <script src="kv-client.js"></script>
    <script src="jixels-store.js"></script>
    <script src="branch-register.js"></script>
    <script src="pwa.js"></script>
</body>
</html>
