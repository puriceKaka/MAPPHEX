<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Registration • Jixels Technologies</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="images/jixels-icon-192.png" type="image/png" />
    <link rel="stylesheet" href="director.css" />
    <link rel="stylesheet" href="agent-register.css" />
  </head>
  <body data-page="agent-register">
    <main class="auth-shell">
      <section class="auth-card" aria-label="Agent registration">
        <header class="auth-header">
          <h1>Jixels Technologies</h1>
          <p class="muted">Create Agent account</p>
        </header>

        <form id="agent-register-form" class="auth-form" autocomplete="off">
          <label class="field">
            <span>Branch</span>
            <select id="branchId" required></select>
          </label>

          <label class="field">
            <span>Username</span>
            <input id="username" type="text" placeholder="e.g. agent01" required />
          </label>

          <label class="field">
            <span>Email</span>
            <input id="email" type="email" placeholder="e.g. agent@gmail.com" required />
          </label>

          <label class="field">
            <span>Password</span>
            <input id="password" type="password" placeholder="Min 8 characters" required />
          </label>

          <label class="field">
            <span>Confirm password</span>
            <input id="confirmPassword" type="password" placeholder="Repeat password" required />
          </label>

          <button class="btn primary" type="submit">Register</button>

          <p id="agent-register-error" class="form-error" role="alert" aria-live="polite"></p>

          <p class="muted" style="margin: 0; font-size: 13px;">
            Already have an account?
            <a href="agent-login.html" style="text-decoration: underline;">Login</a>
          </p>
        </form>

        <footer class="auth-footer muted">
          After registration you will login and start selling for your selected branch.
        </footer>
      </section>
    </main>

    <script src="kv-client.js"></script>
    <script src="jixels-store.js"></script>
    <script src="kv-client.js"></script>
    <script src="jixels-store.js"></script>
    <script src="agent-register.js"></script>
    <script src="pwa.js"></script>
</body>
</html>
